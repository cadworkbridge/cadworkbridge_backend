{% extends "base.html" %}
{% load static %}

{% block title %}Login / Register{% endblock %}

{% block css %}
<!-- Optional: Add your custom CSS -->
<!-- <link rel="stylesheet" href="{% static 'authentication/css/auth_ui.css' %}"> -->
{% endblock %}

{% block body %}
<div class="container mt-5" style="max-width: 500px;">
  <!-- Tabs -->
  <ul class="nav nav-pills nav-justified mb-3" id="auth-tabs" role="tablist">
    <li class="nav-item" role="presentation">
      <button class="nav-link active" id="tab-login" data-bs-toggle="pill" data-bs-target="#login" type="button" role="tab" aria-selected="true">Login</button>
    </li>
    <li class="nav-item" role="presentation">
      <button class="nav-link" id="tab-register" data-bs-toggle="pill" data-bs-target="#register" type="button" role="tab" aria-selected="false">Register</button>
    </li>
  </ul>

  <!-- Tab Content -->
  <div class="tab-content">
    <!-- Login Form -->
    <div class="tab-pane fade show active" id="login" role="tabpanel" aria-labelledby="tab-login">
      <form method="post">
        {% csrf_token %}
        <a href="" class="btn btn-outline-dark w-100 mb-3">
          <img src="https://www.google.com/images/branding/googleg/1x/googleg_standard_color_18dp.png" alt="Google" width="20" class="me-2">
          Sign in with Google
        </a>

        <p class="text-center">or</p>

        <div class="form-outline mb-3">
          <input type="email" class="form-control" placeholder="Email or Username" name="login_email" required />
        </div>

        <div class="form-outline mb-3">
          <input type="password" class="form-control" placeholder="Password" name="login_password" required />
        </div>

        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" value="" id="rememberLogin" />
          <label class="form-check-label" for="rememberLogin"> Remember me </label>
        </div>

        <div class="d-flex justify-content-between mb-3">
          <a href="{% url 'authentication:reset_password' %}">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-primary w-100">Sign In</button>
      </form>
    </div>

    <!-- Register Form -->
    <div class="tab-pane fade" id="register" role="tabpanel" aria-labelledby="tab-register">
      <form method="post">
        {% csrf_token %}
        <a href="" class="btn btn-outline-dark w-100 mb-3">
          <img src="https://www.google.com/images/branding/googleg/1x/googleg_standard_color_18dp.png" alt="Google" width="20" class="me-2">
          Sign up with Google
        </a>

        <p class="text-center">or</p>

        <div class="form-outline mb-3">
          <input type="email" class="form-control" placeholder="Email" name="register_email" required />
        </div>

        <div class="form-outline mb-3">
          <input type="password" class="form-control" placeholder="Password" name="register_password" required />
        </div>

        <div class="form-check d-flex justify-content-center mb-3">
          <input class="form-check-input me-2" type="checkbox" id="registerCheck" required />
          <label class="form-check-label" for="registerCheck">
            I agree to the terms and conditions
          </label>
        </div>

        <button type="submit" class="btn btn-primary w-100">Register</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}

{% block js %}
<script src="{% static 'authentication/js/auth_ui.js' %}"></script>
{% endblock %}
