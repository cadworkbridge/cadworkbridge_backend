{% extends "base.html" %}
{% load static %}

{% block title %}Confirm Password Reset{% endblock %}

{% block body %}
<div class="container mt-5" style="max-width: 500px;">
  <h3 class="text-center mb-4">Set New Password</h3>
  <form id="confirm-reset-form">
    <div class="form-outline mb-3">
      <input type="password" class="form-control" placeholder="New password" required />
    </div>
    <div class="form-outline mb-3">
      <input type="password" class="form-control" placeholder="Repeat new password" required />
    </div>
    <button type="submit" class="btn btn-primary w-100">Set Password</button>
  </form>
</div>
{% endblock %}

{% block js %}
<script src="{% static 'authentication/js/reset_password_confirm.js' %}"></script>
{% endblock %}
