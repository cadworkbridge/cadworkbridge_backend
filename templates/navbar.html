{% load static %}
<nav class="navbar navbar-expand-lg navbar-light bg-light">
  <div class="container-fluid px-4">
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
            data-bs-target="#navbarNav" aria-controls="navbarNav"
            aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link active" href="/">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" href="{% url 'core:contact' %}">Contact</a>
        </li>
      </ul>

      <div class="d-flex" id="auth-buttons">
        <!-- Buttons inserted via JS -->
      </div>
    </div>
  </div>
</nav>

<script>
  document.addEventListener("DOMContentLoaded", async function () {
    const authDiv = document.getElementById("auth-buttons");

    try {
      const res = await fetch("/auth/users/me/", {
        method: "GET",
        credentials: "include", // ✅ Required to send cookies
      });

      if (!res.ok) throw new Error("Not authenticated");

      const data = await res.json();
      const email = data.email;

      authDiv.innerHTML = `
        <a href="/auth/users/me/" class="nav-link me-3">${email}</a>
        <button class="btn btn-outline-danger" id="logoutBtn">Logout</button>
      `;

      document.getElementById("logoutBtn").addEventListener("click", async function () {
        await fetch("/users/logout/", {
          method: "POST",
          credentials: "include"
        });
        location.reload();
      });

    } catch {
      authDiv.innerHTML = `
        <a href="{% url 'authentication:auth_ui' %}" class="btn btn-outline-primary me-2">Login</a>
        <a href="{% url 'authentication:auth_ui' %}" class="btn btn-primary">Sign Up</a>
      `;
    }
  });
</script>
